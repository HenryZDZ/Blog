{% extends "base.html" %}
{% block title %}页面不存在 - {{ config.SITE_NAME }}{% endblock %}

{% block content %}
<div class="error-page">
    <h1>404 · 页面不存在</h1>
    <p>你找的文章可能已经被移动或删除。</p>
    {% if recent_posts %}
    <h3>最近文章</h3>
    <ul class="recent-posts">
        {% for p in recent_posts %}
        <li><a href="{{ url_for('post', slug=p.slug) }}">{{ p.title }}</a></li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
{% endblock %}
